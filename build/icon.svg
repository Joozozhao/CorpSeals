<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- deep ink background with soft vignette -->
    <radialGradient id="bg" cx="50%" cy="38%" r="78%">
      <stop offset="0" stop-color="#2a2f3d"/>
      <stop offset="0.55" stop-color="#181c26"/>
      <stop offset="1" stop-color="#0c0e14"/>
    </radialGradient>

    <!-- gold metallic ring -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6e3a8"/>
      <stop offset="0.35" stop-color="#d8ab5b"/>
      <stop offset="0.65" stop-color="#b07f33"/>
      <stop offset="1" stop-color="#8a5e22"/>
    </linearGradient>

    <!-- burgundy seal field -->
    <radialGradient id="field" cx="42%" cy="34%" r="80%">
      <stop offset="0" stop-color="#9c1f33"/>
      <stop offset="0.6" stop-color="#7c1527"/>
      <stop offset="1" stop-color="#560d1a"/>
    </radialGradient>

    <!-- star emboss gradient -->
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe6bf"/>
      <stop offset="1" stop-color="#d6ad62"/>
    </linearGradient>

    <radialGradient id="topGlow" cx="50%" cy="22%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="emboss" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#3a0a14" flood-opacity="0.55"/>
    </filter>
    <filter id="sealLift" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="34" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#topGlow)"/>
  <!-- hairline inner border for refinement -->
  <rect x="6" y="6" width="1012" height="1012" rx="222" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <g filter="url(#sealLift)">
    <!-- outer gold ring -->
    <circle cx="512" cy="512" r="300" fill="none" stroke="url(#gold)" stroke-width="26"/>
    <!-- thin gold accent rings -->
    <circle cx="512" cy="512" r="278" fill="none" stroke="#e7c685" stroke-opacity="0.5" stroke-width="3"/>
    <!-- burgundy field -->
    <circle cx="512" cy="512" r="262" fill="url(#field)"/>
    <!-- inner gold hairline -->
    <circle cx="512" cy="512" r="238" fill="none" stroke="url(#gold)" stroke-width="6"/>
    <circle cx="512" cy="512" r="226" fill="none" stroke="#3a0a14" stroke-opacity="0.4" stroke-width="2"/>

    <!-- arched top text (pulled inward so glyph tops clear the inner ring) -->
    <path id="arcTop" d="M 327 512 A 185 185 0 0 1 697 512" fill="none"/>
    <text font-family="Optima, Palatino, Georgia, serif" font-size="52"
          font-weight="600" fill="url(#gold)" letter-spacing="8">
      <textPath href="#arcTop" startOffset="50%" text-anchor="middle">CORP · SEAL</textPath>
    </text>

    <!-- embossed five-point star -->
    <g filter="url(#emboss)">
      <path fill="url(#star)" d="M512 392
        l38 78 86 12 -62 60 15 86 -77 -41 -77 41 15 -86 -62 -60 86 -12 z"/>
    </g>

    <!-- bottom flourish -->
    <circle cx="512" cy="660" r="6" fill="url(#gold)"/>
    <rect x="452" y="688" width="120" height="5" rx="2.5" fill="url(#gold)" opacity="0.8"/>
  </g>
</svg>
